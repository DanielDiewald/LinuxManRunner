<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Start</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body onLoad="checksavescore()" class="bb">
    <div id="alex" class="alex">
      <div style="margin: auto">
        <div id="heinz">
          <div id="erika">
            <div id="bar" class="game">
              <div id="heidi">
                <div id="franz">
                  <div id="fritz">
                    <div id="heinrich">
                      <img
                        id="myButton"
                        class="foreground"
                        src="Data/SPRITES/foregroundstart.png"
                        style="
                          position: absolute;
                          top: 0;
                          left: 0;
                          width: 500px;
                          height: 200px;
                          z-index: 200;
                          cursor: pointer;
                        "
                      />
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script>
    function checksavescore() {
      document.getElementById("highscore").innerHTML =
        localStorage.getItem("yourscore");
    }
    function startGame() {
      location.href = "Data/game.html";
    }
    document.getElementById("myButton").onclick = startGame;
    window.onkeydown = function (e) {
      if (e.code === "Space" || e.code === "Enter" || e.code === "ArrowUp") {
        startGame();
      }
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="Data/size.js"></script>
</html>
