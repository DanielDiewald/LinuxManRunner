<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Start</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body onLoad="checksavescore()" style="background-color: black; margin: 0">
    <div
      id="alex"
      class="alex"
      style="
        width: 500px;
        height: 200px;
        margin: auto;
        position: relative;
        overflow: hidden;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      "
    >
      <img
        src="Data/SPRITES/sky.png"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 500px;
          height: 200px;
          z-index: 1;
        "
      />
      <img
        src="Data/SPRITES/clouds.png"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 500px;
          height: 200px;
          z-index: 2;
        "
      />
      <img
        src="Data/SPRITES/background.png"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 500px;
          height: 200px;
          z-index: 3;
        "
      />
      <img
        src="Data/SPRITES/backgroundbuildings.png"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 500px;
          height: 200px;
          z-index: 4;
        "
      />
      <img
        src="Data/SPRITES/train.png"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 500px;
          height: 200px;
          z-index: 5;
        "
      />
      <img
        src="Data/SPRITES/lamps.png"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 500px;
          height: 200px;
          z-index: 6;
        "
      />
      <img
        src="Data/SPRITES/realtrain.png"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 500px;
          height: 200px;
          z-index: 7;
        "
      />
      <img
        id="myButton"
        src="Data/SPRITES/foregroundstart.png"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 500px;
          height: 200px;
          z-index: 200;
          cursor: pointer;
        "
      />
    </div>
  </body>
  <script>
    function checksavescore() {
      document.getElementById("highscore").innerHTML =
        localStorage.getItem("yourscore");
    }
    function startGame() {
      location.href = "Data/game.html";
    }
    document.getElementById("myButton").onclick = startGame;
    window.onkeydown = function (e) {
      if (e.code === "Space" || e.code === "Enter" || e.code === "ArrowUp") {
        startGame();
      }
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="Data/size.js"></script>
</html>
