<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Start</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body onLoad="checksavescore()" style="background-color: black; margin: 0">
    <div
      id="alex"
      class="alex"
      style="
        width: 500px;
        height: 200px;
        margin: auto;
        position: relative;
        overflow: hidden;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      "
    >
      <img
        src="SPRITES/sky.png"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 500px;
          height: 200px;
          z-index: 1;
        "
      />
      <img
        src="SPRITES/clouds.png"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 500px;
          height: 200px;
          z-index: 2;
        "
      />
      <img
        src="SPRITES/background.png"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 500px;
          height: 200px;
          z-index: 3;
        "
      />
      <img
        src="SPRITES/backgroundbuildings.png"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 500px;
          height: 200px;
          z-index: 4;
        "
      />
      <img
        src="SPRITES/train.png"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 500px;
          height: 200px;
          z-index: 5;
        "
      />
      <img
        src="SPRITES/lamps.png"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 500px;
          height: 200px;
          z-index: 6;
        "
      />
      <img
        src="SPRITES/realtrain.png"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 500px;
          height: 200px;
          z-index: 7;
        "
      />
      <img
        id="myButton"
        src="SPRITES/foregroundgameover.png"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 500px;
          height: 200px;
          z-index: 200;
          cursor: pointer;
        "
      />

      <div
        class="top-left"
        style="
          position: absolute;
          top: 0;
          left: 0;
          background-color: black;
          background: rgba(0, 0, 0, 0.3);
          margin-left: 5px;
          z-index: 300;
        "
      >
        <p style="margin: 0; padding: 2px">
          Score: <span id="lastscore"> </span> Highscore:
          <span id="highscore">0</span>
        </p>
      </div>
    </div>
  </body>
  <script>
    function checksavescore() {
      document.getElementById("highscore").innerHTML =
        localStorage.getItem("yourscore");
    }
    function restartGame() {
      location.href = "game.html";
    }
    document.getElementById("myButton").onclick = restartGame;
    window.onkeydown = function (e) {
      if (e.code === "Space" || e.code === "Enter" || e.code === "ArrowUp") {
        restartGame();
      }
    };
    document.getElementById("lastscore").innerHTML =
      localStorage.getItem("lastscore");
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="size.js"></script>
</html>
