<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Start</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body onLoad="checksavescore()" class="bb">
    <div id="alex" class="alex">
      <div style="margin: auto">
        <div id="heinz">
          <div id="erika">
            <div id="bar" class="game">
              <div id="heidi">
                <div id="franz">
                  <div id="fritz">
                    <div id="heinrich">
                      <img
                        id="myButton"
                        class="foreground"
                        src="SPRITES/foregroundgameover.png"
                        style="
                          position: absolute;
                          top: 0;
                          left: 0;
                          width: 500px;
                          height: 200px;
                          z-index: 200;
                          cursor: pointer;
                        "
                      />
                      <div
                        class="top-left"
                        style="
                          background-color: black;
                          background: rgba(0, 0, 0, 0.3);
                          margin-left: 5px;
                        "
                      >
                        <p>
                          Score: <span id="lastscore"> </span> Highscore:
                          <span id="highscore">0</span>
                        </p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script>
    function checksavescore() {
      document.getElementById("highscore").innerHTML =
        localStorage.getItem("yourscore");
    }
    function restartGame() {
      location.href = "game.html";
    }
    document.getElementById("myButton").onclick = restartGame;
    window.onkeydown = function (e) {
      if (e.code === "Space" || e.code === "Enter" || e.code === "ArrowUp") {
        restartGame();
      }
    };
    document.getElementById("lastscore").innerHTML =
      localStorage.getItem("lastscore");
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="size.js"></script>
</html>
