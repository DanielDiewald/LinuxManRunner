<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Game</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body onLoad="checksavescore()" style="background-color: black; margin: 0">
    <div
      id="alex"
      class="alex"
      style="width: 500px; height: 200px; margin: auto"
    >
      <div
        id="game-container"
        style="position: relative; width: 500px; height: 200px"
      >
        <canvas
          id="gameCanvas"
          width="500"
          height="200"
          style="
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
          "
        ></canvas>
        <div
          class="top-left"
          style="
            background-color: black;
            background: rgba(0, 0, 0, 0.3);
            margin-left: 5px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 300;
          "
        >
          <p>
            Score: <span id="scoreSpan">0</span> Highscore:
            <span id="highscore">0</span>
          </p>
          <div style="display: none">
            Last Score: <span id="lastscore">0</span>
          </div>
        </div>
        <img
          class="foreground"
          src="SPRITES/foreground.png"
          style="
            position: absolute;
            top: 0px;
            left: 0px;
            z-index: 200;
            pointer-events: none;
            width: 500px;
            height: 200px;
          "
        />
      </div>
    </div>
  </body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="script.js"></script>
  <script src="size.js"></script>
</html>
